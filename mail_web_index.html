<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mail Panel - {{ domain }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
            width: 100%;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .mailbox-list {
            margin-top: 20px;
        }

        .mailbox-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .mailbox-info {
            flex: 1;
        }

        .mailbox-email {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .mailbox-status {
            font-size: 12px;
            color: #999;
        }

        .mailbox-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            background: #667eea;
        }

        .btn-small:hover {
            background: #764ba2;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #27ae60;
        }

        .btn-success:hover {
            background: #229954;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .logs {
            background: #1e1e1e;
            color: #0f0;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .log-line {
            margin-bottom: 5px;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #333;
        }

        .info-box code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📧 Mail Panel</h1>
            <p class="subtitle">Управление почтовыми ящиками для {{ domain }}</p>
        </header>

        <div id="alerts"></div>

        <div class="grid">
            <!-- Создание ящика -->
            <div class="card">
                <h2>➕ Создать ящик</h2>

                <form id="createForm">
                    <div class="form-group">
                        <label for="username">Имя ящика</label>
                        <input type="text" id="username" name="username" placeholder="например: john" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" placeholder="введите пароль" required>
                    </div>

                    <button type="submit">Создать ящик</button>
                </form>

                <div class="info-box" style="margin-top: 20px;">
                    <strong>Адрес:</strong> <code id="emailPreview">username@{{ domain }}</code><br>
                    <strong>IMAP:</strong> <code>mail.dgtlwhale.com:993</code><br>
                    <strong>SMTP:</strong> <code>mail.dgtlwhale.com:25</code>
                </div>
            </div>

            <!-- Список ящиков -->
            <div class="card">
                <h2>📋 Ящики</h2>
                <button style="margin-bottom: 15px;" onclick="loadMailboxes()">🔄 Обновить список</button>
                <div id="mailboxList" class="mailbox-list">
                    <p style="color: #999;">Загружаю...</p>
                </div>
            </div>
        </div>

        <!-- Отправка тестового письма -->
        <div class="card">
            <h2>✉️ Тестовое письмо</h2>

            <form id="testEmailForm">
                <div class="form-group">
                    <label for="testEmail">Отправить на адрес</label>
                    <input type="email" id="testEmail" name="testEmail" placeholder="test@example.com" required>
                </div>

                <button type="submit">Отправить тестовое письмо</button>
            </form>
        </div>

        <!-- Логи -->
        <div class="card" style="margin-top: 20px;">
            <h2>📊 Последние логи</h2>
            <button style="margin-bottom: 15px;" onclick="loadLogs()">🔄 Обновить</button>
            <div id="logs" class="logs">
                <div class="log-line">Загружаю логи...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const DOMAIN = '{{ domain }}';

        // Обновление превью email адреса
        document.getElementById('username').addEventListener('input', (e) => {
            const username = e.target.value || 'username';
            document.getElementById('emailPreview').textContent = `${username}@${DOMAIN}`;
        });

        // Создание ящика
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/mailboxes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ Ящик ${data.email} создан успешно!`, 'success');
                    document.getElementById('createForm').reset();
                    document.getElementById('emailPreview').textContent = `username@${DOMAIN}`;
                    loadMailboxes();
                } else {
                    showAlert(`❌ Ошибка: ${data.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Ошибка: ${error.message}`, 'error');
            }
        });

        // Отправка тестового письма
        document.getElementById('testEmailForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const to_email = document.getElementById('testEmail').value;

            try {
                const response = await fetch(`${API_URL}/test-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ to: to_email })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ Письмо отправлено на ${to_email}!`, 'success');
                    document.getElementById('testEmailForm').reset();
                } else {
                    showAlert(`❌ Ошибка: ${data.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Ошибка: ${error.message}`, 'error');
            }
        });

        // Загрузка списка ящиков
        async function loadMailboxes() {
            try {
                const response = await fetch(`${API_URL}/mailboxes`);
                const data = await response.json();

                const list = document.getElementById('mailboxList');

                if (data.count === 0) {
                    list.innerHTML = '<p style="color: #999;">Нет ящиков</p>';
                    return;
                }

                list.innerHTML = data.mailboxes.map(box => `
                    <div class="mailbox-item">
                        <div class="mailbox-info">
                            <div class="mailbox-email">📧 ${box.email}</div>
                            <div class="mailbox-status">Статус: ${box.status}</div>
                        </div>
                        <div class="mailbox-actions">
                            <button class="btn-small" onclick="changePassword('${box.email.split('@')[0]}')">🔐 Пароль</button>
                            <button class="btn-small btn-danger" onclick="deleteMailbox('${box.email.split('@')[0]}')">🗑️ Удалить</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showAlert(`❌ Ошибка загрузки: ${error.message}`, 'error');
            }
        }

        // Изменение пароля
        async function changePassword(username) {
            const newPassword = prompt(`Новый пароль для ${username}@${DOMAIN}:`);

            if (!newPassword) return;

            try {
                const response = await fetch(`${API_URL}/mailboxes/${username}/password`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ Пароль для ${data.email} изменен!`, 'success');
                } else {
                    showAlert(`❌ Ошибка: ${data.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Ошибка: ${error.message}`, 'error');
            }
        }

        // Удаление ящика
        async function deleteMailbox(username) {
            if (!confirm(`Вы уверены? Ящик ${username}@${DOMAIN} будет удален безвозвратно!`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/mailboxes/${username}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ Ящик ${data.email} удален!`, 'success');
                    loadMailboxes();
                } else {
                    showAlert(`❌ Ошибка: ${data.error}`, 'error');
                }
            } catch (error) {
                showAlert(`❌ Ошибка: ${error.message}`, 'error');
            }
        }

        // Загрузка логов
        async function loadLogs() {
            try {
                const response = await fetch(`${API_URL}/logs?lines=30`);
                const data = await response.json();

                const logs = document.getElementById('logs');
                logs.innerHTML = data.logs.map(log =>
                    `<div class="log-line">${log}</div>`
                ).join('');
            } catch (error) {
                showAlert(`❌ Ошибка загрузки логов: ${error.message}`, 'error');
            }
        }

        // Показать уведомление
        function showAlert(message, type) {
            const alerts = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;

            alerts.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        // Загрузить при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            loadMailboxes();
            loadLogs();
        });

        // Автообновление логов каждые 30 сек
        setInterval(loadLogs, 30000);
    </script>
</body>
</html>
