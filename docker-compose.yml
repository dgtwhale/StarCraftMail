version: "3.8"
services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MAIL_DOMAIN=yourdomain.com
    volumes:
      - /etc/dovecot:/etc/dovecot:ro
      - /etc/postfix:/etc/postfix:ro
      - /var/mail:/var/mail
      - /var/log:/var/log
    restart: unless-stopped
    network_mode: host
